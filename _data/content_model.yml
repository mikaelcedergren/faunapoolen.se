shared_fields:
  identity:
    - title
    - slug
    - permalink
    - lang
    - translation_key
    - published
    - order
  seo:
    - seo_title
    - description
    - canonical_url
    - og_image
  hero:
    - hero_label
    - hero_title
    - hero_text
    - hero_image
    - hero_image_alt
  body:
    - sections
    - body

collections:
  site_pages:
    purpose: General editable pages, including start, about, contact, blog index, services index, pricing index, and supplier index.
    outputs_pages: true
    source_types:
      - home
      - general_page
      - contact
      - article_index
      - service_index
      - pricing_index
      - supplier_index
    fields:
      - identity
      - seo
      - hero
      - sections
      - body
      - related_items
  articles:
    purpose: Blog/article pages preserving `/blog/posts/*.html` URLs.
    outputs_pages: true
    source_types:
      - article
    fields:
      - identity
      - seo
      - date
      - author
      - excerpt
      - hero
      - body
      - related_articles
  services:
    purpose: Service entries and service landing content.
    outputs_pages: true
    source_types:
      - service_page
    fields:
      - identity
      - seo
      - hero
      - summary
      - image
      - sections
      - body
  product_series:
    purpose: Product or series pages such as Plunge, Swim, Waterfront, Koi, and package landing pages.
    outputs_pages: true
    source_types:
      - product_series
    fields:
      - identity
      - seo
      - hero
      - package_cards
      - specs
      - faq_refs
      - sections
      - body
  pricing_items:
    purpose: Structured pricing/package entries used to generate the pricing page.
    outputs_pages: false
    source_types:
      - pricing_item
    fields:
      - title
      - anchor_id
      - summary
      - features
      - price_text
      - note
      - image
      - related_series
      - order
      - published
  suppliers:
    purpose: Structured supplier entries used to generate the suppliers page.
    outputs_pages: false
    source_types:
      - supplier
    fields:
      - name
      - logo
      - description
      - website
      - order
      - active

section_blocks:
  - text
  - text_image
  - cards
  - feature_list
  - process_steps
  - faq_refs
  - testimonial_refs
  - gallery
  - cta
  - markdown
