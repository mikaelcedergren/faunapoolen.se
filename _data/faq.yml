- id: vilka-typer-av-vattenmiljoer-installerar-ni
  question: Vilka typer av vattenmiljöer installerar ni?
  answer: |-
    <p>Vi specialiserar oss på ett brett utbud av högkvalitativa och miljövänliga vattenmiljöer, inklusive naturpooler, koi-dammar, vattenfall, fontäner, bäckar och vattenlagringslösningar.</p>
                        <p>Varje design anpassas efter din yta, livsstil och estetiska preferenser.</p>
  order: 10
  active: true
- id: hur-fungerar-faunapoolens-vattenmiljoer
  question: Hur fungerar Faunapoolens vattenmiljöer?
  answer: "<p>Våra vattenmiljöer bygger på ett recirkulerande system där vattnet ständigt
    rör sig genom biologisk och mekanisk filtrering. Det minskar både avfall och underhåll
    — samtidigt som du får klart, friskt vatten året runt. Vi använder Aquascapes
    ekosystem, en beprövad metod som efterliknar naturens eget kretslopp. Resultatet
    är en vacker vattenmiljö helt utan starka kemikalier.</p>"
  order: 20
  active: true
- id: hur-mycket-utrymme-behover-jag-for-en-vattenmiljo
  question: Hur mycket utrymme behöver jag för en vattenmiljö?
  answer: "<p>Vattenmiljöer kan utformas för alla typer av utrymmen, från små bubblande
    fontäner för kompakta trädgårdar till större dammar och vattenfall. Även på begränsade
    ytor kan vi skapa en rofylld och hållbar vattenmiljö som förhöjer din trädgård.</p>"
  order: 30
  active: true
- id: kommer-vattenmiljon-att-fungera-i-min-lokala-miljo
  question: Kommer vattenmiljön att fungera i min lokala miljö?
  answer: "<p>Ja! Varje vattenmiljö utformas specifikt för din fastighet och dess
    omgivning. Vi tar hänsyn till platsförhållanden, estetik och funktionalitet för
    att skapa en unik design som harmoniserar med din trädgård.</p>"
  order: 40
  active: true
- id: hur-valjer-jag-ratt-vattenmiljo-for-min-tradgard
  question: Hur väljer jag rätt vattenmiljö för min trädgård?
  answer: "<p>Att välja rätt vattenmiljö beror på din tillgängliga yta, önskad estetik
    och hur mycket underhåll du vill ha.</p>"
  order: 50
  active: true
- id: behover-jag-en-stor-tradgard-for-att-installera-en-vattenmiljo
  question: Behöver jag en stor trädgård för att installera en vattenmiljö?
  answer: "<p>Inte alls! vattenmiljöer finns i olika storlekar och stilar för att
    passa alla utrymmen. Om du har en liten uteplats, innergård eller till och med
    en balkong kan en bubblande stenfontän eller en minidamm vara en perfekt lösning.</p>"
  order: 60
  active: true
- id: kan-jag-anpassa-designen-pa-min-vattenmiljo
  question: Kan jag anpassa designen på min vattenmiljö?
  answer: "<p>Ja! Varje vattenmiljö kan anpassas helt för att matcha din stil och
    ditt landskap. Från val av natursten och skräddarsydda vattenfall till integrerad
    LED-belysning och akvatiska växter – din vattenmiljö kan bli lika unik som din
    utemiljö. Oavsett om du föredrar en modern och stilren design eller ett naturligt
    och djurvänligt ekosystem, arbetar vi med Aquascapes hållbara produkter för att
    skapa en vattenmiljö som är skräddarsydd efter din vision.</p>"
  order: 70
  active: true
- id: kommer-min-vattenmiljo-att-forbattras-med-tiden
  question: Kommer min vattenmiljö att förbättras med tiden?
  answer: "<p>Ja! En välutformad vattenmiljö utvecklas vackert över tid när akvatiska
    växter etablerar sig, nyttiga bakterier balanserar ekosystemet och en naturlig
    patina förhöjer sten- och träelement. Med tiden kommer vattenmiljön att locka
    fler djur och skapa en levande, självförsörjande miljö som bara blir bättre med
    åren.</p>"
  order: 80
  active: true
