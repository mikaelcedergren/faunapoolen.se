---
layout: default
---

{% if page.hero_image %}
<div class="background-image">
  <img src="{{ page.hero_image | relative_url }}" alt="{{ page.hero_image_alt | default: page.title | escape }}">
</div>
{% endif %}

<header>
  <a href="{% if page.lang == 'en' %}{{ '/en/blog/' | relative_url }}{% else %}{{ '/blog/' | relative_url }}{% endif %}">
    <span class="material-symbols-outlined">arrow_back</span><span>{% if page.lang == 'en' %}Back{% else %}Tillbaka{% endif %}</span>
  </a>
  <h1>{{ page.title }}</h1>
  {% if page.excerpt %}<p>{{ page.excerpt }}</p>{% endif %}
</header>

<section class="blog-post">
  <div class="section-content">
    {{ content }}
  </div>
</section>

{% include related-articles.html %}
{% include cta-soft.html %}
