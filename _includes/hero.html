{% assign hero_title = page.hero_title | default: page.title %}
{% if page.hero_image %}
<div class="background-image{% if page.hero_tight_fade %} tight-fade{% endif %}">
  <img src="{{ page.hero_image | relative_url }}" alt="{{ page.hero_image_alt | default: hero_title | escape }}">
</div>
{% endif %}

{% if hero_title %}
<header>
  {% if page.hero_label %}<pre>{{ page.hero_label }}</pre>{% endif %}
  <h1>{{ hero_title }}</h1>
  {% if page.hero_text %}<p>{{ page.hero_text }}</p>{% endif %}
</header>
{% endif %}
